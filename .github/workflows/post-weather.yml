name: Post weather to Discord

on:
  workflow_dispatch:
    inputs:
      report_mode:
        description: 'auto / full / tsurumi24'
        required: false
        default: 'auto'
  schedule:
    # 04:20 / 10:20 / 16:20 / 22:20
    # 04:20 は ①②③、その他は ①のみを投稿
    - cron: '30 3,9,15,21 * * *'
      timezone: 'Asia/Tokyo'

jobs:
  post-weather:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Post weather
        run: npm run post-weather
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIMEZONE: 'Asia/Tokyo'
          REPORT_MODE: ${{ github.event.inputs.report_mode || 'auto' }}
          RAIN_MM_THRESHOLD_24H: '0.5'
          RAIN_MM_THRESHOLD_LONG: '1'
          STRONG_WIND_THRESHOLD: '8'
          STRONG_GUST_THRESHOLD: '15'
