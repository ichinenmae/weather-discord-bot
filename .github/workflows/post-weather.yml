name: Post weather to Discord

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10,16,21 * * *'
      timezone: 'Asia/Tokyo'

jobs:
  post-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Post weather
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run post-weather
